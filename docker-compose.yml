services:
  postgres:
    image: postgres:16
    container_name: news_agg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: news_agg
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d news_agg"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
